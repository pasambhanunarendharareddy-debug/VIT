name: CyberGuard CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'tut-main/package-lock.json'

    - name: Install dependencies
      working-directory: ./tut-main
      run: npm ci

    - name: Build project
      working-directory: ./tut-main
      run: npm run build
